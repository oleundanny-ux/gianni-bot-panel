[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @workspace/bot-panel run build && pnpm --filter @workspace/api-server run build && cp -r artifacts/bot-panel/dist/public artifacts/api-server/dist/public"

[deploy]
startCommand = "node artifacts/api-server/dist/index.mjs"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
