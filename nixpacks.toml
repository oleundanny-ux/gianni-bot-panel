[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/bot-panel run build && pnpm --filter @workspace/api-server run build && cp -r artifacts/bot-panel/dist/public artifacts/api-server/dist/public"
]
